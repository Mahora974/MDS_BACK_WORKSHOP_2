# Docker compose DEV => docker compose up --build -d
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD:-app_password}@postgres:5432/${POSTGRES_DB:-app_db}?schema=app
    command: sh -c "npx prisma generate && npm run start:dev"
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules

volumes:
  api_node_modules: